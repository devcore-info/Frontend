<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Registro de Soporte</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="form-container">
        <h2>Registrar Personal Técnico (CU7)</h2>
        <form id="register-form">
            <label for="name">Nombre</label>
            <input type="text" id="name" required placeholder="Escriba su nombre">

            <label for="firstSurname">Primer Apellido</label>
            <input type="text" id="firstSurname" required placeholder="Escriba su primer apellido">

            <label for="secondSurname">Segundo Apellido</label>
            <input type="text" id="secondSurname" required placeholder="Escriba su segundo apellido">

            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required placeholder="ejemplo@connextion.com">

            <label for="password">Contraseña</label>
            <input type="password" id="password" required placeholder="••••••••">

            <label for="role">Rol en Soporte</label>
            <select id="role" required>
                <option value="false">Soportista</option>
                <option value="true">Supervisor</option>
            </select>

            <label>Áreas Tecnológicas de Soporte</label>
            <div class="checkbox-group" id="services-group">
                <div>
                    <input type="checkbox" id="service-1" value="1">
                    <label for="service-1">Telefonía móvil</label>
                </div>
                <div>
                    <input type="checkbox" id="service-2" value="2">
                    <label for="service-2">Cable</label>
                </div>
                <div>
                    <input type="checkbox" id="service-3" value="3">
                    <label for="service-3">Internet</label>
                </div>
                <div>
                    <input type="checkbox" id="service-4" value="4">
                    <label for="service-4">Telefonía fija</label>
                </div>
            </div>

            <button type="submit" id="submit-btn">Registrar Personal</button>
        </form>
        <div id="message"></div>
        <p style="text-align: center; margin-top: 20px;"><a href="index.html" style="color: var(--accent-blue); text-decoration: none;">&larr; Volver al Inicio</a></p>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = '';
            messageDiv.className = '';

            // Get selected services
            const checkedBoxes = document.querySelectorAll('#services-group input[type="checkbox"]:checked');
            if (checkedBoxes.length === 0) {
                messageDiv.textContent = 'Debe seleccionar al menos un área tecnológica de soporte.';
                messageDiv.className = 'error';
                return;
            }

            const services = Array.from(checkedBoxes).map(box => parseInt(box.value, 10));
            const name = document.getElementById('name').value.trim();
            const firstSurname = document.getElementById('firstSurname').value.trim();
            const secondSurname = document.getElementById('secondSurname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const isSupervisor = document.getElementById('role').value === 'true';

            const payload = {
                name,
                firstSurname,
                secondSurname,
                email,
                password,
                isSupervisor,
                services
            };

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registrando...';

            try {
                const response = await fetch('http://localhost:8080/Backend/resources/api/v1/support/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = data.message || 'Personal de soporte registrado con éxito.';
                    messageDiv.className = 'success';
                    document.getElementById('register-form').reset();
                } else {
                    messageDiv.textContent = data.error || 'Error al registrar personal.';
                    messageDiv.className = 'error';
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                messageDiv.textContent = 'Error de conexión con el servidor. Por favor, intente más tarde.';
                messageDiv.className = 'error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Registrar Personal';
            }
        });
    </script>
</body>
</html>
