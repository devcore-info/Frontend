<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Login Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .form-container button {
            background-color: var(--accent-purple);
        }
        .form-container button:hover {
            background-color: var(--accent-purple-hover);
        }
        .form-container button:focus {
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.4);
        }
        .input-group {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Portal de Soporte (CU8)</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5;">
            Inicie sesión con sus credenciales institucionales para acceder a la gestión de soporte y tickets.
        </p>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Institucional</label>
                <input type="email" id="email" name="email" placeholder="correo@connextion.com" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="submitBtn">Ingresar al Portal</button>
        </form>

        <div id="message"></div>

        <p style="text-align: center; margin-top: 24px;">
            <a href="index.html" style="color: var(--accent-purple); text-decoration: none; font-size: 0.95rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: color var(--transition-speed);" onmouseover="this.style.color='var(--accent-purple-hover)'" onmouseout="this.style.color='var(--accent-purple)'">&larr; Volver al Inicio</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Limpiar mensajes anteriores y ocultar el contenedor
                messageDiv.style.display = 'none';
                messageDiv.className = '';
                messageDiv.textContent = '';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                // Agregar estado de carga
                submitBtn.classList.add('btn-loading');
                submitBtn.disabled = true;

                try {
                    const response = await fetch('http://localhost:8080/Backend/resources/api/v1/support/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });

                    let data = {};
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        data = await response.json();
                    } else {
                        const text = await response.text();
                        if (text) {
                            data = { message: text };
                        }
                    }

                    if (response.ok) {
                        // En caso de éxito, guardar en localStorage correo (userEmail) y booleano (isSupervisor)
                        const userEmail = data.userEmail || data.email || email;
                        const isSupervisor = data.isSupervisor === true || data.isSupervisor === 'true';

                        localStorage.setItem('userEmail', userEmail);
                        localStorage.setItem('isSupervisor', isSupervisor.toString());

                        messageDiv.textContent = 'Inicio de sesión correcto. Redireccionando...';
                        messageDiv.className = 'success';
                        messageDiv.style.display = 'block';

                        // Redireccionar u orientar el flujo según el rol devuelto (Supervisor vs. Técnico)
                        setTimeout(() => {
                            if (isSupervisor) {
                                window.location.href = 'supervisor-dashboard.html';
                            } else {
                                window.location.href = 'tech-dashboard.html';
                            }
                        }, 1000);

                    } else {
                        // Manejo de credenciales inválidas u otro error HTTP
                        const errorMsg = data.message || 'Credenciales inválidas. Por favor, verifique sus datos.';
                        messageDiv.textContent = errorMsg;
                        messageDiv.className = 'error';
                        messageDiv.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error de conexión:', error);
                    messageDiv.textContent = 'Error de conexión. Por favor, asegúrese de que el servicio backend esté activo.';
                    messageDiv.className = 'error';
                    messageDiv.style.display = 'block';
                } finally {
                    // Remover estado de carga del botón
                    submitBtn.classList.remove('btn-loading');
                    submitBtn.disabled = false;
                }
            });
        <h2>Portal del Personal de Soporte (CU8)</h2>
        <form id="login-form">
            <label for="email">Correo Institucional</label>
            <input type="email" id="email" required placeholder="correo@connextion.com">

            <label for="password">Contraseña</label>
            <input type="password" id="password" required placeholder="••••••••">

            <button type="submit" id="submit-btn">Ingresar</button>
        </form>
        <div id="message"></div>
        <p style="text-align: center; margin-top: 20px;"><a href="index.html" style="color: var(--accent-blue); text-decoration: none;">&larr; Volver al Inicio</a></p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const messageDiv = document.getElementById('message');
            messageDiv.textContent = '';
            messageDiv.className = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const payload = {
                email,
                password
            };

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Autenticando...';

            try {
                const response = await fetch('http://localhost:8080/Backend/resources/api/v1/support/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = 'Acceso exitoso. Redireccionando...';
                    messageDiv.className = 'success';

                    // Save data to localStorage
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('isSupervisor', data.isSupervisor);
                    localStorage.setItem('userName', data.name || '');
                    localStorage.setItem('supportUserId', data.supportUserId || '');

                    // Redirect to the dashboard
                    setTimeout(() => {
                        window.location.href = 'support-dashboard.html';
                    }, 1000);
                } else {
                    messageDiv.textContent = data.error || 'Credenciales inválidas.';
                    messageDiv.className = 'error';
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                messageDiv.textContent = 'Error al conectar con el servidor. Verifique su conexión.';
                messageDiv.className = 'error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>
