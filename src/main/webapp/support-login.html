<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Login Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="form-container">
        <h2>Portal del Personal de Soporte (CU8)</h2>
        <form id="login-form">
            <label for="email">Correo Institucional</label>
            <input type="email" id="email" required placeholder="correo@connextion.com">

            <label for="password">Contraseña</label>
            <input type="password" id="password" required placeholder="••••••••">

            <button type="submit" id="submit-btn">Ingresar</button>
        </form>
        <div id="message"></div>
        <p style="text-align: center; margin-top: 20px;"><a href="index.html" style="color: var(--accent-blue); text-decoration: none;">&larr; Volver al Inicio</a></p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const messageDiv = document.getElementById('message');
            messageDiv.textContent = '';
            messageDiv.className = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const payload = {
                email,
                password
            };

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Autenticando...';

            try {
                const response = await fetch('http://localhost:8080/Backend/resources/api/v1/support/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = 'Acceso exitoso. Redireccionando...';
                    messageDiv.className = 'success';

                    // Save data to localStorage
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('isSupervisor', data.isSupervisor);
                    localStorage.setItem('userName', data.name || '');
                    localStorage.setItem('supportUserId', data.supportUserId || '');

                    // Redirect to the dashboard
                    setTimeout(() => {
                        window.location.href = 'support-dashboard.html';
                    }, 1000);
                } else {
                    messageDiv.textContent = data.error || 'Credenciales inválidas.';
                    messageDiv.className = 'error';
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                messageDiv.textContent = 'Error al conectar con el servidor. Verifique su conexión.';
                messageDiv.className = 'error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>
