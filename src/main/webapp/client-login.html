<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Login de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Ingreso de Clientes (CU2)</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5;">
            Inicie sesión con su correo electrónico y contraseña registrados para acceder a su portal de ayuda.
        </p>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="submitBtn">Ingresar al Portal</button>
        </form>

        <div id="message"></div>

        <p style="text-align: center; margin-top: 24px;">
            ¿No tiene una cuenta? <a href="client-register.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Regístrese aquí</a>
        </p>
        <p style="text-align: center; margin-top: 10px;">
            <a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 0.95rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: color var(--transition-speed);" onmouseover="this.style.color='var(--accent-blue-hover)'" onmouseout="this.style.color='var(--accent-blue)'">&larr; Volver al Inicio</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Limpiar mensajes anteriores
                messageDiv.style.display = 'none';
                messageDiv.className = '';
                messageDiv.textContent = '';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                submitBtn.disabled = true;
                submitBtn.textContent = 'Autenticando...';

                const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? 'http://localhost:8080'
                    : 'https://webapps-production-d1d7.up.railway.app';

                try {
                    const response = await fetch(`${API_BASE}/Gateaway/gateway/clients/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        messageDiv.textContent = 'Inicio de sesión correcto. Redireccionando...';
                        messageDiv.className = 'success';
                        messageDiv.style.display = 'block';

                        // Guardar en localStorage
                        localStorage.setItem('userEmail', data.email);
                        localStorage.setItem('userName', data.name || '');
                        localStorage.setItem('clientId', data.clientId || '');

                        // Redireccionar al dashboard de clientes después de 1 segundo
                        setTimeout(() => {
                            window.location.href = 'client-dashboard.html';
                        }, 1000);

                    } else {
                        messageDiv.textContent = data.error || 'Credenciales inválidas.';
                        messageDiv.className = 'error';
                        messageDiv.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error de conexión:', error);
                    messageDiv.textContent = 'Error al conectar con el servidor. Asegúrese de que el servicio esté activo.';
                    messageDiv.className = 'error';
                    messageDiv.style.display = 'block';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Ingresar al Portal';
                }
            });
        });
    </script>
</body>
</html>
