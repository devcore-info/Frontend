<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Detalle de Caso</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .detail-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 20px;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-card) 0%, #1e293b 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }

        .ticket-info h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ticket-meta {
            display: flex;
            gap: 16px;
            color: var(--text-muted);
            font-size: 0.95rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .ticket-meta span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }

        .badge-status {
            background-color: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .badge-status.resuelto {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .badge-status.en-progreso {
            background-color: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .detail-grid {
                grid-template-columns: 1.2fr 1.8fr;
            }
        }

        .section-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .section-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .data-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .data-value {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        .data-value-block {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Comments section */
        .comments-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 480px;
        }

        .comments-thread {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-grow: 1;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 20px;
        }

        .comments-thread::-webkit-scrollbar {
            width: 6px;
        }

        .comments-thread::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 3px;
        }

        .comments-thread::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .comment-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            word-break: break-word;
        }

        .comment-client {
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.25);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .comment-support {
            background-color: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .comment-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .comment-author-client {
            color: var(--accent-blue);
        }

        .comment-author-support {
            color: var(--accent-purple);
        }

        .comment-text {
            color: var(--text-main);
        }

        .comment-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-style: italic;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 100%;
        }

        .comment-empty-icon {
            font-size: 2.5rem;
            opacity: 0.5;
        }

        /* Comment box */
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .comment-form textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            resize: vertical;
            transition: border-color var(--transition-speed);
        }

        .comment-form textarea:focus {
            border-color: var(--accent-blue);
        }

        .comment-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .comment-form button {
            padding: 10px 20px;
            background-color: var(--accent-blue);
            color: var(--text-main);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color var(--transition-speed);
        }

        .comment-form button:hover {
            background-color: var(--accent-blue-hover);
        }

        .comment-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color var(--transition-speed);
            align-self: flex-start;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        #error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 80px 0;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-left-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <a href="client-dashboard.html" class="back-btn">&larr; Volver al Panel</a>
        
        <div id="error-message"></div>

        <!-- Loader -->
        <div id="loader" class="loading">
            <div class="spinner"></div>
            <p>Cargando detalles del ticket...</p>
        </div>

        <!-- Dashboard Content (Hidden until loaded) -->
        <div id="dashboard-content" style="display: none; display: flex; flex-direction: column; gap: 24px;">
            <!-- Header section -->
            <header class="detail-header">
                <div class="ticket-info">
                    <h1 id="ticket-title">Ticket #--</h1>
                    <div class="ticket-meta">
                        <span id="ticket-service">Servicio: --</span>
                        <span id="ticket-date">Registrado el: --</span>
                    </div>
                </div>
                <div id="ticket-status-container">
                    <span class="badge badge-status" id="ticket-status">--</span>
                </div>
            </header>

            <!-- Grid for details and comments -->
            <main class="detail-grid">
                <!-- Left column: Ticket Info -->
                <section class="section-card">
                    <h2>Datos del Reporte</h2>
                    
                    <div class="data-item">
                        <span class="data-label">Descripción Reportada</span>
                        <div class="data-value-block" id="ticket-description">--</div>
                    </div>

                    <div class="data-item">
                        <span class="data-label">Dirección</span>
                        <span class="data-value" id="client-address">--</span>
                    </div>

                    <div class="data-item">
                        <span class="data-label">Teléfono de Contacto</span>
                        <span class="data-value" id="client-phone">--</span>
                    </div>

                    <div class="data-item">
                        <span class="data-label">Correo de Contacto</span>
                        <span class="data-value" id="client-email">--</span>
                    </div>

                    <div class="data-item">
                        <span class="data-label">Encargado de Soporte</span>
                        <span class="data-value" id="support-assigned" style="font-weight: 600;">--</span>
                    </div>
                </section>

                <!-- Right column: Comments Thread -->
                <section class="section-card comments-container">
                    <h2>Hilo de Comentarios</h2>
                    
                    <div class="comments-thread" id="comments-thread-container">
                        <!-- Comments populated dynamically -->
                    </div>

                    <!-- Input form -->
                    <form class="comment-form" id="new-comment-form">
                        <textarea id="comment-text-input" placeholder="Escriba un comentario sobre este ticket..." required></textarea>
                        <div class="comment-actions">
                            <span id="form-message" style="font-size: 0.9rem;"></span>
                            <button type="submit" id="submit-comment-btn">Enviar Comentario</button>
                        </div>
                    </form>
                </section>
            </main>
        </div>
    </div>

    <script>
        // Retrieve parameters and state
        const urlParams = new URLSearchParams(window.location.search);
        const ticketId = urlParams.get('id') || urlParams.get('ticketId');
        
        // Logged in user info fallbacks
        const clientId = parseInt(localStorage.getItem('clientId') || localStorage.getItem('userId') || '1', 10);
        const clientEmailLocal = localStorage.getItem('userEmail') || '';
        const clientNameLocal = localStorage.getItem('userName') || '';

        const loader = document.getElementById('loader');
        const dashboardContent = document.getElementById('dashboard-content');
        const errorMessage = document.getElementById('error-message');

        if (!ticketId) {
            showError('Error: No se especificó un número de ticket en los parámetros de la URL.');
        } else {
            loadTicketDetails();
        }

        function showError(msg) {
            loader.style.display = 'none';
            dashboardContent.style.display = 'none';
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }

        // Fetch and render ticket details
        async function loadTicketDetails() {
            try {
                const response = await fetch(`http://localhost:8080/Gateaway/gateway/issues/${ticketId}`);
                if (!response.ok) {
                    throw new Error(`Error en el servidor (${response.status})`);
                }
                const data = await response.json();
                renderTicket(data);
            } catch (error) {
                console.error('Error fetching ticket details:', error);
                showError('No se pudieron cargar los detalles del ticket. Verifique que la API Gateway esté en ejecución.');
            }
        }

        function renderTicket(data) {
            loader.style.display = 'none';
            dashboardContent.style.display = 'flex';

            const issue = data.issue || {};
            const comments = data.comments || [];

            // Header info
            document.getElementById('ticket-title').textContent = `Ticket #${issue.id || ticketId}`;
            document.getElementById('ticket-service').textContent = `Servicio: ${issue.serviceName || 'No especificado'}`;
            
            const dateStr = issue.registerTimestamp 
                ? new Date(issue.registerTimestamp).toLocaleString('es-ES', { dateStyle: 'medium', timeStyle: 'short' })
                : 'No especificada';
            document.getElementById('ticket-date').textContent = `Registrado el: ${dateStr}`;

            // Badge status
            const statusVal = issue.status || 'Ingresado';
            const statusEl = document.getElementById('ticket-status');
            statusEl.textContent = statusVal;
            statusEl.className = 'badge badge-status'; // reset
            if (statusVal.toLowerCase() === 'resuelto' || statusVal.toLowerCase() === 'finalizado') {
                statusEl.classList.add('resuelto');
            } else if (statusVal.toLowerCase() === 'en progreso' || statusVal.toLowerCase() === 'asignado') {
                statusEl.classList.add('en-progreso');
            }

            // Details section
            document.getElementById('ticket-description').textContent = issue.description || 'Sin descripción reportada.';
            
            // Render address, phone, and contact email (look in response issue object, otherwise fallbacks)
            document.getElementById('client-address').textContent = issue.address || issue.clientAddress || 'No especificada';
            document.getElementById('client-phone').textContent = issue.phone || issue.clientPhone || 'No especificado';
            
            const emailValue = issue.email || issue.clientEmail || clientEmailLocal || 'No especificado';
            document.getElementById('client-email').textContent = emailValue;
            
            document.getElementById('support-assigned').textContent = issue.supportUserAssignedName || 'Sin asignar';

            // Comments thread
            renderComments(comments);
        }

        function renderComments(comments) {
            const container = document.getElementById('comments-thread-container');
            container.innerHTML = '';

            if (comments.length === 0) {
                container.innerHTML = `
                    <div class="comment-empty">
                        <div class="comment-empty-icon">💬</div>
                        <p>No hay comentarios registrados para este caso aún.</p>
                    </div>
                `;
                return;
            }

            // Sort comments chronologically (ascending: oldest first)
            const sortedComments = [...comments].sort((a, b) => {
                return new Date(a.commentTimestamp) - new Date(b.commentTimestamp);
            });

            sortedComments.forEach(comment => {
                const isClient = comment.userType === 'CLIENT';
                const bubble = document.createElement('div');
                bubble.className = `comment-bubble ${isClient ? 'comment-client' : 'comment-support'}`;

                // Formatting timestamp
                const timeStr = comment.commentTimestamp 
                    ? new Date(comment.commentTimestamp).toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' })
                    : '';

                const authorName = comment.userName || (isClient ? 'Cliente' : 'Soporte Técnico');
                const authorClass = isClient ? 'comment-author-client' : 'comment-author-support';

                bubble.innerHTML = `
                    <div class="comment-meta">
                        <span class="${authorClass}">${authorName}</span>
                        <span>${timeStr}</span>
                    </div>
                    <div class="comment-text">${comment.description || ''}</div>
                `;
                container.appendChild(bubble);
            });

            // Scroll to the bottom of the thread
            container.scrollTop = container.scrollHeight;
        }

        // Post new comment
        document.getElementById('new-comment-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const textInput = document.getElementById('comment-text-input');
            const submitBtn = document.getElementById('submit-comment-btn');
            const formMessage = document.getElementById('form-message');

            const commentText = textInput.value.trim();
            if (!commentText) return;

            // Prepare request
            const payload = {
                description: commentText,
                userType: 'CLIENT',
                userId: clientId
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            formMessage.textContent = '';
            formMessage.className = '';

            try {
                const response = await fetch(`http://localhost:8080/Gateaway/gateway/issues/${ticketId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Error al agregar comentario (${response.status})`);
                }

                // Comment successfully added
                textInput.value = '';
                formMessage.textContent = '¡Comentario agregado!';
                formMessage.style.color = '#10b981';

                // Reload all details to show new comment
                await loadTicketDetails();

                setTimeout(() => {
                    formMessage.textContent = '';
                }, 3000);

            } catch (error) {
                console.error('Error posting comment:', error);
                formMessage.textContent = 'Error al enviar. Intente de nuevo.';
                formMessage.style.color = '#ef4444';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Comentario';
            }
        });
    </script>
</body>
</html>
