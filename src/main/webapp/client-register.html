<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Registro de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        @media (min-width: 480px) {
            .form-grid-2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
        }
        .form-container {
            max-width: 600px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-container label {
            margin-top: 0;
            margin-bottom: 6px;
        }
        .form-container input[type="text"], 
        .form-container input[type="email"], 
        .form-container input[type="password"],
        .form-container input[type="tel"] {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Registro de Cliente (CU1)</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5;">
            Complete los siguientes datos para registrar su cuenta y gestionar sus servicios contratados.
        </p>

        <form id="registerForm">
            <!-- Datos Personales -->
            <div class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Su nombre" required>
                </div>
                <div class="form-grid-2">
                    <div class="form-group">
                        <label for="primerApellido">Primer Apellido *</label>
                        <input type="text" id="primerApellido" name="primerApellido" placeholder="Primer apellido" required>
                    </div>
                    <div class="form-group">
                        <label for="segundoApellido">Segundo Apellido *</label>
                        <input type="text" id="segundoApellido" name="segundoApellido" placeholder="Segundo apellido" required>
                    </div>
                </div>
            </div>

            <!-- Email y Password -->
            <div class="form-grid-2" style="margin-bottom: 16px;">
                <div class="form-group">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                </div>
            </div>

            <!-- Datos Adicionales (Opcionales) -->
            <h3 style="font-size: 1.1rem; margin-top: 24px; margin-bottom: 16px; font-weight: 600; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; color: var(--accent-blue);">Información Adicional (Opcional)</h3>
            
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="direccion">Dirección Física</label>
                <input type="text" id="direccion" name="direccion" placeholder="Calle, número, departamento, ciudad">
            </div>

            <div class="form-grid-2" style="margin-bottom: 16px;">
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="+506 8888-8888">
                </div>
                <div class="form-group">
                    <label for="segundoContacto">Segundo Contacto</label>
                    <input type="tel" id="segundoContacto" name="segundoContacto" placeholder="+506 2222-2222">
                </div>
            </div>

            <!-- Servicios Contratados -->
            <div class="form-group" style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px;">Servicios Contratados * (Seleccione al menos uno)</label>
                <div class="checkbox-group" id="servicesGroup">
                    <div>
                        <input type="checkbox" id="service1" name="services" value="1">
                        <label for="service1">Telefonía móvil</label>
                    </div>
                    <div>
                        <input type="checkbox" id="service2" name="services" value="2">
                        <label for="service2">Cable</label>
                    </div>
                    <div>
                        <input type="checkbox" id="service3" name="services" value="3">
                        <label for="service3">Internet</label>
                    </div>
                    <div>
                        <input type="checkbox" id="service4" name="services" value="4">
                        <label for="service4">Telefonía fija</label>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn">Registrar Cuenta</button>
        </form>

        <div id="message"></div>

        <p style="text-align: center; margin-top: 24px;">
            <a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 0.95rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: color var(--transition-speed);" onmouseover="this.style.color='var(--accent-blue-hover)'" onmouseout="this.style.color='var(--accent-blue)'">&larr; Volver al Inicio</a>
        </p>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8080'
            : 'https://webapps-production-d1d7.up.railway.app';

        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Limpiar mensajes anteriores y ocultar el contenedor
                messageDiv.style.display = 'none';
                messageDiv.className = '';
                messageDiv.textContent = '';

                // Validar que al menos se seleccione un servicio contratado
                const checkboxes = document.querySelectorAll('input[name="services"]:checked');
                if (checkboxes.length === 0) {
                    messageDiv.textContent = 'Debe seleccionar al menos un servicio contratado.';
                    messageDiv.className = 'error';
                    messageDiv.style.display = 'block';
                    messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    return;
                }

                // Capturar y estructurar los datos del formulario
                const nombre = document.getElementById('nombre').value.trim();
                const primerApellido = document.getElementById('primerApellido').value.trim();
                const segundoApellido = document.getElementById('segundoApellido').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const direccion = document.getElementById('direccion').value.trim();
                const telefono = document.getElementById('telefono').value.trim();
                const segundoContacto = document.getElementById('segundoContacto').value.trim();

                // Servicios contratados (arreglo de objetos y arreglo plano)
                const serviciosIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
                const servicios = serviciosIds.map(id => ({ id: id }));

                // Crear un payload robusto compatible con el modelo Client de Java
                const payload = {
                    name: nombre,
                    firstSurname: primerApellido,
                    secondSurname: segundoApellido,
                    email: email,
                    password: password,
                    address: direccion,
                    phone: telefono,
                    secondContact: segundoContacto,
                    services: serviciosIds
                };

                // Activar estado de carga
                submitBtn.classList.add('btn-loading');
                submitBtn.disabled = true;

                try {
                    const response = await fetch('${API_BASE}/Gateaway/gateway/clients/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    let data = {};
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        data = await response.json();
                    } else {
                        const text = await response.text();
                        if (text) {
                            data = { message: text };
                        }
                    }

                    if (response.ok) {
                        messageDiv.textContent = '¡Registro completado con éxito! Redireccionando al portal de inicio de sesión...';
                        messageDiv.className = 'success';
                        messageDiv.style.display = 'block';
                        registerForm.reset();

                        // Redireccionar al login de clientes después de 2 segundos
                        setTimeout(() => {
                            window.location.href = 'client-login.html';
                        }, 2000);
                    } else {
                        const errorMsg = data.message || 'Error en el registro. Por favor, verifique los datos introducidos.';
                        messageDiv.textContent = errorMsg;
                        messageDiv.className = 'error';
                        messageDiv.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Error de red:', error);
                    messageDiv.textContent = 'Error de conexión. Asegúrese de que el backend esté ejecutándose e intente de nuevo.';
                    messageDiv.className = 'error';
                    messageDiv.style.display = 'block';
                } finally {
                    submitBtn.classList.remove('btn-loading');
                    submitBtn.disabled = false;
                    messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        });
    </script>
</body>
</html>
